# All build tooling runs in the `tool` image; the repo is bind-mounted so
# public/ is written back to the host. Nothing is installed on the host.
#
#   docker compose build tool                       # build the toolchain image
#   docker compose run --rm build                   # one-off site build -> public/
#   docker compose run --rm tool <any command>      # ad-hoc (vendor fetch, pyftsubset)
#   docker compose up serve                          # local preview on :1313
services:
  tool:
    build: .
    image: bluefox-cafe-tool
    working_dir: /src
    # Run as the host user so public/, resources/ and .hugo_build.lock
    # come back host-owned instead of root-owned. Defaults to 1000:1000
    # override with `UID=$(id -u) GID=$(id -g)`.
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - .:/src
    entrypoint: []

  build:
    extends: tool
    command: hugo --gc --minify

  serve:
    extends: tool
    command: hugo server --bind 0.0.0.0 --port 1313 --disableFastRender
    ports:
      - "1313:1313"
