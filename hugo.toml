baseURL = "https://bluefox.cafe/"
languageCode = "en"
title = "bluefox.cafe"

# This is a set of small bespoke pages, not a blog.
disableKinds = ["taxonomy", "term", "RSS", "sitemap"]
enableRobotsTXT = false

# Production URL -> local dev path. Applied at build time by the
# resolve-url partial, but ONLY when running under `hugo server`
# (hugo.IsServer). A production build emits the real URLs untouched.
[params.devUrls]
"https://bluefox.cafe"           = "/"
"https://dnd.bluefox.cafe"       = "/dnd/"
"https://demiplane.bluefox.cafe" = "/previews/demiplane/"
"https://beastworld.bluefox.cafe" = "/previews/beastworld/"
"https://files.bluefox.cafe"     = "/previews/files/"

[markup.goldmark.renderer]
# Pages are authored as HTML in front matter / layouts.
unsafe = true

# Emit hugo_stats.json so Tailwind (css.Tailwind) can scan the classes
# actually used in rendered output instead of guessing from templates.
[build.buildStats]
enable = true

[[build.cachebusters]]
source = 'assets/notwatching/hugo_stats\.json'
target = 'css'

[[build.cachebusters]]
source = '(postcss|tailwind)\.config\.js'
target = 'css'

[[build.cachebusters]]
source = 'assets/.*\.(css|js)'
target = 'css'

[outputs]
home = ["HTML"]
section = ["HTML"]
page = ["HTML"]
