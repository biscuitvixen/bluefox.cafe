{{ define "main" }}
    <div class="max-w-3xl mx-auto px-6 py-10">

        <!-- Back to home -->
        <a href="https://bluefox.cafe" data-resolve
           class="group inline-flex items-center gap-2 mb-6 text-sm text-white/45 hover:text-white transition-colors">
            <i class="fa-solid fa-arrow-left transition-transform group-hover:-translate-x-0.5"></i>
            bluefox.cafe
        </a>

        <!-- Header / hero -->
        <header class="hero-card relative overflow-hidden rounded-3xl mb-10 p-8 ring-1 ring-white/10 shadow-float">
            <div class="orb-eyes absolute -top-16 -right-16 w-56 h-56 rounded-full opacity-55 blur-3xl"></div>
            <div class="orb-belly absolute -bottom-16 -left-16 w-56 h-56 rounded-full opacity-50 blur-3xl"></div>

            <div class="relative text-center">
                <div class="flex justify-center mb-5">
                    <span class="text-6xl text-eyes glow-eyes"><i class="fa-solid fa-dice-d20"></i></span>
                </div>
                <h1 class="text-5xl font-bold mb-3"
                    style="font-family: 'Cinzel Decorative', serif; letter-spacing: 0.02em;">Roll Initiative</h1>
                <div class="flex items-center justify-center gap-2">
                    <span class="inline-block w-2 h-2 rounded-full bg-eyes shadow-[0_0_10px_rgba(36,217,98,0.8)] animate-[pulse-dot_2.5s_ease-in-out_infinite]"></span>
                    <span class="text-xs uppercase tracking-[0.2em] text-white/60">authenticated</span>
                </div>
            </div>
        </header>

        <!-- Games - full-width prominent cards -->
        <section class="mb-10">
            <h2 class="text-xs uppercase tracking-[0.2em] text-white/40 mb-3 px-1">Games</h2>
            <div class="flex flex-col gap-3">
                {{ range .Params.games }}
                <a href="{{ .href }}" data-resolve
                   class="group relative block overflow-hidden rounded-2xl bg-sides ring-1 ring-white/5
                          shadow-float transition-all duration-200
                          hover:-translate-y-0.5 hover:shadow-lift hover:ring-eyes/40">
                    <!-- Left accent stripe - belly blue, fades to nothing -->
                    <div class="absolute left-0 top-0 bottom-0 w-1"
                         style="background: linear-gradient(180deg, #497bd6, #24d962);
                                opacity: 0.7;"></div>
                    <div class="flex items-center gap-5 p-6 pl-7">
                        <div class="text-4xl">{{ .icon }}</div>
                        <div class="min-w-0 flex-1">
                            <div class="font-semibold text-lg">{{ .name }}</div>
                            <div class="text-sm text-white/55 mt-0.5">{{ .desc }}</div>
                        </div>
                        <div class="text-white/30 group-hover:text-eyes group-hover:translate-x-1 transition-all text-xl">→</div>
                    </div>
                </a>
                {{ end }}
            </div>
        </section>

        <!-- Tools - member-accessible utilities -->
        <section class="mb-10">
            <h2 class="text-xs uppercase tracking-[0.2em] text-white/40 mb-3 px-1">Tools</h2>
            <div class="flex flex-col gap-1.5">
                {{ partial "link-rows.html" (dict "items" .Params.tools "resolve" true) }}
            </div>
        </section>
    </div>
{{ end }}
