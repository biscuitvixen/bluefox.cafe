{{/* Compact link-row list.
     Context: { items: slice of {name, icon, desc, href} }
     hrefs are resolved to dev paths at build time under `hugo server`. */}}
{{ range .items }}
<a href="{{ partial "resolve-url.html" .href }}"
   class="group flex items-center gap-3 px-4 py-2.5 rounded-lg
          bg-sides/40 ring-1 ring-fg/5
          hover:bg-sides hover:ring-fg/10 transition-all duration-150">
    <div class="text-base w-5 text-center">{{ .icon }}</div>
    <div class="font-medium text-sm">{{ .name }}</div>
    <div class="text-xs text-fg/40 truncate">{{ .desc }}</div>
    <div class="ml-auto text-fg/30 group-hover:text-eyes transition-colors text-sm">→</div>
</a>
{{ end }}
